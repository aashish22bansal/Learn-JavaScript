<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Table Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Advanced HTML Table Search</h2>

<div class="table-wrapper" id="table-1">
    <input class="exact-search" placeholder="Exact search">
    <input class="fuzzy-search" placeholder="Fuzzy search">

    <label><input type="checkbox" class="location-filter" value="india"> India</label>
    <label><input type="checkbox" class="location-filter" value="usa"> USA</label>

    <label>
        <input type="checkbox" class="data-toggle">
        Data roles only
    </label>

    <table>
        <tbody>
            <tr><td>Aashish</td><td>Data Analyst</td><td>India</td></tr>
            <tr><td>Rohit</td><td>Developer</td><td>USA</td></tr>
        </tbody>
    </table>
</div>

<hr>



<div class="table-wrapper" id="table-2">
    <input class="exact-search" placeholder="Exact search">
    <input class="fuzzy-search" placeholder="Fuzzy search">

    <label><input type="checkbox" class="location-filter" value="india"> India</label>
    <label><input type="checkbox" class="location-filter" value="usa"> USA</label>

    <label>
        <input type="checkbox" class="data-toggle">
        Data roles only
    </label>

    <table>
        <tbody>
            <tr><td>Aashish</td><td>Data Analyst</td><td>India</td></tr>
            <tr><td>Rohit</td><td>Developer</td><td>USA</td></tr>
        </tbody>
    </table>
</div>

<hr>


<script src="script.js"></script>
</body>
</html>
